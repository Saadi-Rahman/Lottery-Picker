<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lottery Picker</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
  </head>

  <body
    class="bg-orange-50 dark:bg-slate-900 flex justify-center p-3 min-h-screen"
  >
    <!--Main Container-->
    <div
      class="w-full max-w-md bg-amber-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-2xl shadow-2xl p-5"
    >
      <!--Header-->
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold text-slate-800 dark:text-amber-400">
          🎲 Lottery Picker
        </h2>
        <div class="relative">
          <div class="flex items-center gap-4">
            <!--Theme Toggle Button-->
            <button
              id="themeToggle"
              class="text-slate-300 hover:text-amber-400 transition text-xl"
              title="Toggle Theme"
            >
              <i id="themeIcon" class="fa-solid fa-moon"></i>
            </button>
            <!-- Hamburger Button -->
            <button
              id="menuBtn"
              class="text-slate-300 text-3xl hover:text-amber-400 transition duration-200"
            >
              <i class="fa-solid fa-bars"></i>
            </button>
          </div>

          <!-- Dropdown Menu -->
          <div
            id="dropdownMenu"
            class="hidden absolute right-0 mt-2 w-52 bg-orange-50 dark:bg-slate-800 border border-amber-500 dark:border-slate-600 rounded-xl shadow-2xl overflow-hidden z-50"
          >
            <a
              href="index.html"
              class="block px-4 py-3 bg-orange-100 dark:bg-slate-600 text-slate-700 dark:text-amber-500 font-semibold"
            >
              Home
            </a>

            <a
              href="how-it-works.html"
              class="block px-4 py-3 text-slate-900 dark:text-slate-200 hover:bg-amber-50 dark:hover:bg-slate-700 hover:text-amber-500 dark:hover:text-amber-500 hover:font-semibold transition"
            >
              How It Works
            </a>

            <a
              href="features.html"
              class="block px-4 py-3 text-slate-900 dark:text-slate-200 hover:bg-amber-50 dark:hover:bg-slate-700 hover:text-amber-500 dark:hover:text-amber-500 hover:font-semibold transition"
            >
              Features
            </a>

            <a
              href="about.html"
              class="block px-4 py-3 text-slate-900 dark:text-slate-200 hover:bg-amber-50 dark:hover:bg-slate-700 hover:text-amber-500 dark:hover:text-amber-500 hover:font-semibold transition"
            >
              About
            </a>
          </div>
        </div>
      </div>

      <!--Input Section-->
      <div class="flex gap-2 mb-4">
        <input
          id="nameInput"
          type="text"
          placeholder="Enter participant name"
          class="flex-1 min-w-0 px-3 py-2 bg-orange-50 dark:bg-slate-700 border border-amber-500 dark:border-slate-600 text-slate-800 dark:text-white placeholder-slate-400 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"
        />

        <button
          id="addBtn"
          class="shrink-0 px-4 py-2 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-lg transition"
        >
          Add
        </button>
      </div>

      <!--Participants Section-->
      <div class="mb-4">
        <h3 class="font-semibold text-slate-800 dark:text-slate-200 mb-2">
          Participants (<span id="participantCount">0</span>)
        </h3>

        <ul
          id="participantList"
          class="bg-orange-50 dark:bg-slate-700 border border-amber-500 dark:border-slate-600 rounded-xl p-3 min-h-[80px] text-slate-800 dark:text-slate-200"
        ></ul>
      </div>

      <!--Lottery action Buttons-->
      <!-- <button
        id="pickBtn"
        class="w-full mt-4 bg-violet-600 hover:bg-violet-700 text-white font-bold py-3 rounded-xl shadow-lg transition disabled:bg-slate-600 disabled:text-slate-400"
      >
        🎲 Random Pick
      </button> -->
      <div class="flex gap-3 mt-4">
        <!-- Random Pick -->
        <button
          id="pickBtn"
          class="flex-1 py-2 px-4 bg-violet-600 hover:bg-violet-700 text-white font-semibold rounded-lg transition disabled:bg-slate-600 disabled:text-slate-400 disabled:cursor-not-allowed"
        >
          🎲 Random Pick
        </button>

        <!-- Draw All -->
        <button
          id="quickDrawBtn"
          class="py-2 px-4 bg-amber-500 hover:bg-amber-600 text-slate-900 font-semibold rounded-lg transition disabled:bg-slate-600 disabled:text-slate-400 disabled:cursor-not-allowed"
        >
          <i class="fa-solid fa-bolt-lightning"></i> Quick Draw
        </button>
      </div>

      <!--Results Section-->
      <div class="mt-4">
        <h3 class="font-semibold text-slate-800 dark:text-slate-200 mb-2">
          Results
        </h3>

        <ul
          id="resultList"
          class="bg-orange-100 dark:bg-amber-900/20 border border-amber-600 dark:border-amber-700 rounded-xl p-3 min-h-[80px] text-slate-800 dark:text-amber-200"
        ></ul>
      </div>

      <!--Lottery Status-->
      <div
        id="statusContainer"
        class="flex justify-center items-center gap-3 mt-4"
      >
        <span id="status" class="text-amber-400 text-lg font-bold"> </span>

        <button
          id="resetBtn"
          class="hidden w-8 h-8 rounded-full bg-amber-500 hover:bg-amber-600 text-slate-900 shadow-lg transition hover:rotate-180"
        >
          <i class="fa-solid fa-arrows-rotate"></i>
        </button>
      </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/theme.js"></script>
  </body>
</html>
