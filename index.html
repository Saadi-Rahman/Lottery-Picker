<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lottery Picker</title>
    <link rel="icon" type="image/svg+xml" href="assets/dice-favicon.png" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
  </head>

  <body
    id="vanta-bg"
    class="bg-orange-50 dark:bg-slate-900 flex justify-center p-3 min-h-screen"
  >
    <!--Main Container-->
    <div
      class="w-full max-w-md bg-amber-50/10 dark:bg-slate-800/10 border border-slate-300 dark:border-slate-700 rounded-2xl shadow-2xl p-5 flex flex-col min-h-[90vh]"
    >
      <!--Header-->
      <div class="flex justify-between items-center mt-5 mb-10">
        <h2
          class="flex items-center gap-2 text-2xl font-bold text-slate-800 dark:text-amber-400 flex items-center gap-2"
        >
          <img
            src="assets/dice-header-icon.png"
            alt="Dice"
            class="dice w-8 h-8"
          />
          Lottery Picker
        </h2>
        <div class="relative">
          <div class="flex items-center gap-4">
            <!--Theme Toggle Button-->
            <button
              id="themeToggle"
              class="text-slate-300 hover:text-amber-400 transition text-xl"
              title="Toggle Theme"
            >
              <i id="themeIcon" class="fa-solid fa-moon"></i>
            </button>
            <!-- Hamburger Button -->
            <button
              id="menuBtn"
              class="text-slate-300 text-3xl hover:text-amber-400 transition duration-200"
            >
              <i class="fa-solid fa-bars"></i>
            </button>
          </div>

          <!-- Dropdown Menu -->
          <div
            id="dropdownMenu"
            class="hidden absolute right-0 mt-2 w-52 bg-orange-50 dark:bg-slate-800 border border-amber-500 dark:border-slate-600 rounded-xl shadow-2xl overflow-hidden z-50"
          >
            <a
              href="index.html"
              class="block px-4 py-3 bg-orange-100 dark:bg-slate-600 text-slate-700 dark:text-amber-500 font-semibold"
            >
              Home
            </a>

            <a
              href="how-it-works.html"
              class="block px-4 py-3 text-slate-900 dark:text-slate-200 hover:bg-amber-50 dark:hover:bg-slate-700 hover:text-amber-500 dark:hover:text-amber-500 hover:font-semibold transition"
            >
              How It Works
            </a>

            <a
              href="features.html"
              class="block px-4 py-3 text-slate-900 dark:text-slate-200 hover:bg-amber-50 dark:hover:bg-slate-700 hover:text-amber-500 dark:hover:text-amber-500 hover:font-semibold transition"
            >
              Features
            </a>

            <a
              href="about.html"
              class="block px-4 py-3 text-slate-900 dark:text-slate-200 hover:bg-amber-50 dark:hover:bg-slate-700 hover:text-amber-500 dark:hover:text-amber-500 hover:font-semibold transition"
            >
              About
            </a>
          </div>
        </div>
      </div>

      <!--Input Section-->
      <div class="input flex gap-2 mb-4">
        <input
          id="nameInput"
          type="text"
          placeholder="Enter participant name"
          class="flex-1 min-w-0 px-3 py-2.5 bg-orange-50/40 dark:bg-slate-700/60 border border-amber-500 dark:border-slate-600 text-slate-900 dark:text-white placeholder-slate-400 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 dark:disabled:bg-slate-800 disabled:cursor-not-allowed"
        />

        <button
          id="addBtn"
          class="shrink-0 px-4 py-2.5 bg-gradient-to-bl from-red-400 via-amber-300 to-orange-400 hover:from-red-500 hover:via-amber-400 hover:to-orange-500 font-bold rounded-lg transition disabled:bg-none disabled:bg-slate-600 disabled:text-slate-400 disabled:cursor-not-allowed"
        >
          Add
        </button>
      </div>

      <!--Participants Section-->
      <div class="mb-4">
        <h3 class="font-semibold text-slate-800 dark:text-slate-200 mb-2">
          Participants (<span id="participantCount">0</span>)
        </h3>

        <ul
          id="participantList"
          class="bg-orange-50/40 dark:bg-slate-700/60 border border-amber-500 dark:border-slate-600 rounded-xl p-3 min-h-[80px] text-slate-800 dark:text-slate-200"
        ></ul>
      </div>

      <!--Lottery action Buttons-->
      <div class="flex gap-2 mt-2">
        <!-- Random Pick -->
        <button
          id="pickBtn"
          class="flex-1 py-2.5 px-2 sm:px-4 bg-gradient-to-bl from-indigo-400 via-violet-800 to-purple-400 hover:from-indigo-500 hover:via-violet-900 hover:to-purple-500 text-white font-semibold rounded-lg transition disabled:bg-none disabled:bg-slate-600 disabled:text-slate-400 disabled:cursor-not-allowed"
        >
          🎲 Random Pick
        </button>

        <!-- Quick Draw -->
        <button
          id="quickDrawBtn"
          class="py-2.5 px-3 sm:px-4 bg-gradient-to-bl from-red-500 via-amber-400 to-orange-500 hover:from-red-600 hover:via-amber-500 hover:to-orange-600 font-semibold rounded-lg font-semibold rounded-lg transition disabled:bg-none disabled:bg-slate-600 disabled:text-slate-400 disabled:cursor-not-allowed"
        >
          <i class="fa-solid fa-bolt-lightning"></i> Quick Draw
        </button>
      </div>

      <!--Results Section-->
      <div class="mt-4">
        <h3 class="font-semibold text-slate-800 dark:text-slate-200 mb-2">
          Results
        </h3>

        <ul
          id="resultList"
          class="bg-orange-100/40 dark:bg-amber-900/20 border border-amber-600 dark:border-amber-700 rounded-xl p-3 min-h-[80px] text-slate-900 dark:text-amber-200"
        ></ul>
      </div>

      <!--Lottery Status-->
      <div
        id="statusContainer"
        class="flex justify-center items-center gap-3 m-4"
      >
        <span
          id="status"
          class="text-violet-600 dark:text-amber-400 text-lg font-bold"
        >
        </span>

        <button
          id="resetBtn"
          class="hidden w-8 h-8 rounded-full bg-amber-500 hover:bg-amber-600 text-slate-900 shadow-lg transition hover:rotate-180"
        >
          <i class="fa-solid fa-arrows-rotate"></i>
        </button>
      </div>

      <!-- Footer -->
      <footer
        class="mt-auto pt-4 border-t border-slate-200 dark:border-slate-700 text-center text-sm text-slate-500 dark:text-slate-400"
      >
        © 2026 Lottery Picker v1.2
      </footer>
    </div>

    <script src="js/app.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/theme.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <!-- <script src="js/background.js"></script> // Vanta Animation -->
  </body>
</html>
