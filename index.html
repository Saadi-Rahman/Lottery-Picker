<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lottery Picker</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h2>🎲 Lottery Picker</h2>

        <div class="menu-container">
          <button id="menuBtn" class="menu-btn">&#9776;</button>

          <div id="dropdownMenu" class="dropdown-menu">
            <a href="index.html">Home</a>
            <a href="how-it-works.html">How It Works</a>
            <a href="features.html">Features</a>
            <a href="about.html">About</a>
          </div>
        </div>
      </div>

      <div class="input-area">
        <input type="text" id="nameInput" placeholder="Enter name" />
        <button id="addBtn">OK</button>
      </div>

      <div class="section">
        <h3>Participants (<span id="participantCount">0</span>)</h3>
        <ul id="participantList"></ul>
      </div>

      <button id="pickBtn">Random Pick</button>

      <div class="section">
        <h3>Results</h3>
        <ul id="resultList"></ul>
      </div>

      <div id="statusContainer">
        <span id="status"></span>

        <button id="resetBtn" title="Restart Lottery">🔄</button>
      </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/menu.js"></script>
  </body>
</html>
